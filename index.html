<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Suivi Essence</title>
  
  <link rel="manifest" href="manifest.json">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Essence">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#0f172a">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f1f5f9;
      padding: 16px;
      color: #1e293b;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior: none;
    }
    .container { max-width: 500px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 20px; font-size: 1.6rem; color: #0f172a; }
    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }
    form { display: flex; flex-direction: column; gap: 14px; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    label { font-weight: 600; font-size: 0.9rem; color: #334155; }
    input, select {
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      font-size: 1rem;
      background: #f8fafc;
      transition: all 0.2s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
      background: white;
    }
    button {
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    button.primary { background: #2563eb; color: white; }
    button.primary:hover { background: #1d4ed8; }
    button.secondary { background: #e2e8f0; color: #1e293b; }
    button.secondary:hover { background: #cbd5e1; }
    button.danger { background: #fee2e2; color: #b91c1c; }
    button.danger:hover { background: #fecaca; }

    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 4px; }
    th {
      text-align: left;
      padding: 10px 4px;
      border-bottom: 2px solid #e2e8f0;
      color: #64748b;
      font-weight: 600;
    }
    td { padding: 10px 4px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    .stats {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      background: #f8fafc;
      padding: 14px;
      border-radius: 16px;
      margin-bottom: 16px;
    }
    .stat { display: flex; flex-direction: column; align-items: center; }
    .stat-value { font-size: 1.3rem; font-weight: 700; }
    .stat-label { font-size: 0.8rem; color: #64748b; text-align: center; }
    .actions { display: flex; gap: 12px; margin-top: 14px; justify-content: center; }
    .waiting { color: #94a3b8; font-style: italic; }
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .pill.full { background: #dcfce7; color: #166534; }
    .pill.partial { background: #fef08a; color: #854d0e; }
    .checkbox-field {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .checkbox-field input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin: 0;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
<div class="container">
  <h1>⛽ Suivi essence</h1>

  <div class="card">
    <form id="fuel-form">
      <div class="field">
        <label for="date">Date</label>
        <input type="date" id="date" required>
      </div>
      <div class="field">
        <label for="litres">Litres (L)</label>
        <input type="number" id="litres" step="0.01" min="0.1" placeholder="Ex: 45.5" inputmode="decimal" required>
      </div>
      <div class="field">
        <label for="prix">Prix payé (€)</label>
        <input type="number" id="prix" step="0.01" min="0.01" placeholder="Ex: 78.3" inputmode="decimal" required>
      </div>
      <div class="checkbox-field">
        <input type="checkbox" id="full-tank" checked>
        <label for="full-tank">Plein complet (réservoir rempli)</label>
      </div>
      <div class="field" id="km-field">
        <label for="km">Km parcourus depuis le dernier plein complet</label>
        <input type="number" id="km" step="0.1" min="0.1" placeholder="Ex: 520" inputmode="decimal">
      </div>
      <button type="submit" class="primary">➕ Ajouter</button>
    </form>
  </div>

  <div id="stats-section" class="card" style="display: none;">
    <div class="stats">
      <div class="stat">
        <span class="stat-value" id="avg-consumption">--</span>
        <span class="stat-label">Conso moyenne (L/100km)</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="total-spent">--</span>
        <span class="stat-label">Dépense totale (€)</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="total-km">--</span>
        <span class="stat-label">Kilomètres cumulés</span>
      </div>
    </div>
  </div>

  <div id="monthly-section" class="card" style="display: none;">
    <h2 style="font-size: 1.1rem; margin-bottom: 12px;">📊 Statistiques mensuelles</h2>
    <div id="monthly-container"></div>
  </div>

  <div class="card">
    <h2 style="font-size: 1.1rem; margin-bottom: 12px;">📋 Historique</h2>
    <div id="table-container">
      <p style="color: #64748b; text-align: center;">Aucun plein enregistré.</p>
    </div>
    <div class="actions" id="action-buttons" style="display: none;">
      <button id="export-btn" class="secondary">📤 Exporter CSV</button>
      <button id="clear-btn" class="danger">🗑️ Tout effacer</button>
    </div>
  </div>
</div>

<script>
  (function() {
    const STORAGE_KEY = 'fuel_logs_v5';
    let logs = [];  // chaque entrée : { date, litres, prix, km (null ou nombre), full (bool) }

    function loadLogs() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        logs = saved ? JSON.parse(saved) : [];
      } catch (e) { logs = []; }
    }

    function saveLogs() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
    }

    // Retourne l'index du dernier plein complet avant l'index donné (ou -1)
    function getPreviousFullIndex(beforeIndex) {
      for (let i = beforeIndex - 1; i >= 0; i--) {
        if (logs[i].full) return i;
      }
      return -1;
    }

    // Calcule la consommation pour un plein complet d'index idx
    // en cumulant depuis le plein complet précédent (ou début)
    function computeConsumptionForFullTank(idx) {
      if (!logs[idx].full || logs[idx].km === null) return null;
      const prevFullIdx = getPreviousFullIndex(idx);
      let totalLitres = 0;
      const startIdx = prevFullIdx === -1 ? 0 : prevFullIdx + 1;
      for (let i = startIdx; i <= idx; i++) {
        totalLitres += logs[i].litres;
      }
      const km = logs[idx].km;
      return km > 0 ? ((totalLitres * 100) / km).toFixed(1) : null;
    }

    // Stats globales (basées sur les périodes entre pleins complets)
    function computeGlobalStats() {
      let totalLitres = 0;
      let totalKm = 0;
      // On parcourt tous les pleins complets
      for (let i = 0; i < logs.length; i++) {
        if (logs[i].full && logs[i].km !== null && logs[i].km > 0) {
          const prevFullIdx = getPreviousFullIndex(i);
          let litresSum = 0;
          const startIdx = prevFullIdx === -1 ? 0 : prevFullIdx + 1;
          for (let j = startIdx; j <= i; j++) {
            litresSum += logs[j].litres;
          }
          totalLitres += litresSum;
          totalKm += logs[i].km;
        }
      }
      const avgConso = totalKm > 0 ? (totalLitres * 100) / totalKm : 0;
      const totalSpent = logs.reduce((sum, e) => sum + e.prix, 0);
      return {
        avgConso: avgConso.toFixed(2),
        totalSpent: totalSpent.toFixed(2),
        totalKm: totalKm.toFixed(1)
      };
    }

    // Statistiques mensuelles : on répartit la consommation des périodes sur les mois concernés
    function computeMonthlyStats() {
      const months = {}; // clé YYYY-MM -> { litres, prix, km }
      // On identifie les périodes de pleins complets
      for (let i = 0; i < logs.length; i++) {
        if (logs[i].full && logs[i].km !== null && logs[i].km > 0) {
          const prevFullIdx = getPreviousFullIndex(i);
          const startIdx = prevFullIdx === -1 ? 0 : prevFullIdx + 1;
          // Période [startIdx, i] : tous les pleins
          // On cumule les litres et prix sur la période
          let periodLitres = 0;
          let periodPrix = 0;
          for (let j = startIdx; j <= i; j++) {
            periodLitres += logs[j].litres;
            periodPrix += logs[j].prix;
          }
          const periodKm = logs[i].km;
          // Répartition simple : on attribue tout au mois du plein complet (i)
          // car on ne connaît pas la répartition précise des km dans les mois précédents.
          const monthKey = logs[i].date.substring(0, 7);
          if (!months[monthKey]) {
            months[monthKey] = { litres: 0, prix: 0, km: 0 };
          }
          months[monthKey].litres += periodLitres;
          months[monthKey].prix += periodPrix;
          months[monthKey].km += periodKm;
        } else if (!logs[i].full) {
          // Appoint : on ajoute le prix au mois correspondant, mais on ne peut pas attribuer de km
          const monthKey = logs[i].date.substring(0, 7);
          if (!months[monthKey]) months[monthKey] = { litres: 0, prix: 0, km: 0 };
          months[monthKey].prix += logs[i].prix;
          // Pour les litres, on peut les cumuler, ils seront inclus dans la conso du mois lors du prochain plein complet
          // Mais pour l'instant on ne les compte pas dans la conso mensuelle, seulement dans la dépense.
          // On va les stocker temporairement pour information, mais la conso mensuelle ne peut être calculée que si un plein complet termine le mois.
          // Nous allons plutôt faire comme suit : on ajoute les litres au mois en cours, et les km seront ajoutés plus tard via le plein complet.
          months[monthKey].litres += logs[i].litres; // On les garde, mais ils ne servent pas pour la conso du mois s'il n'y a pas de km
        }
      }

      // Transformer en tableau
      const monthlyArray = Object.keys(months).map(month => {
        const m = months[month];
        const conso = m.km > 0 ? ((m.litres * 100) / m.km).toFixed(1) : null;
        return {
          month,
          totalPrix: m.prix.toFixed(2),
          totalKm: m.km.toFixed(1),
          conso
        };
      }).sort((a, b) => b.month.localeCompare(a.month));

      return monthlyArray;
    }

    function renderMonthlyStats() {
      const container = document.getElementById('monthly-container');
      const section = document.getElementById('monthly-section');
      const data = computeMonthlyStats();
      if (data.length === 0) {
        section.style.display = 'none';
        return;
      }
      section.style.display = 'block';
      let html = `<table class="monthly-table">
        <thead><tr><th>Mois</th><th>Conso (L/100)</th><th>Dépense (€)</th><th>Km</th></tr></thead><tbody>`;
      data.forEach(item => {
        const [year, monthNum] = item.month.split('-');
        const date = new Date(year, monthNum - 1);
        const monthName = date.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
        const consoDisplay = item.conso ? item.conso : '<span class="waiting">—</span>';
        html += `<tr>
          <td>${monthName}</td>
          <td>${consoDisplay}</td>
          <td>${item.totalPrix}</td>
          <td>${item.totalKm}</td>
        </tr>`;
      });
      html += '</tbody></table>';
      container.innerHTML = html;
    }

    function renderTable() {
      const tableContainer = document.getElementById('table-container');
      const statsSection = document.getElementById('stats-section');
      const actionBtns = document.getElementById('action-buttons');

      if (logs.length === 0) {
        tableContainer.innerHTML = '<p style="color:#64748b; text-align:center;">Aucun plein enregistré.</p>';
        statsSection.style.display = 'none';
        document.getElementById('monthly-section').style.display = 'none';
        actionBtns.style.display = 'none';
        return;
      }

      actionBtns.style.display = 'flex';
      statsSection.style.display = 'block';

      const global = computeGlobalStats();
      document.getElementById('avg-consumption').textContent = global.avgConso;
      document.getElementById('total-spent').textContent = global.totalSpent + ' €';
      document.getElementById('total-km').textContent = global.totalKm + ' km';

      // Tableau historique
      let html = `<table><thead><tr><th>Date</th><th>Type</th><th>L</th><th>€</th><th>€/L</th><th>Km</th><th>L/100</th><th></th></tr></thead><tbody>`;

      // Afficher du plus récent au plus ancien
      const displayList = [...logs].reverse();
      displayList.forEach((entry, displayIndex) => {
        const realIndex = logs.length - 1 - displayIndex;
        const prixL = entry.litres > 0 ? (entry.prix / entry.litres).toFixed(2) : '-';
        const typePill = entry.full
          ? '<span class="pill full">Complet</span>'
          : '<span class="pill partial">Appoint</span>';

        let kmDisplay, consoDisplay;
        if (entry.full && entry.km !== null) {
          kmDisplay = entry.km.toFixed(1);
          const conso = computeConsumptionForFullTank(realIndex);
          consoDisplay = conso ? conso : '?';
        } else {
          kmDisplay = '<span class="waiting">—</span>';
          consoDisplay = '<span class="waiting">—</span>';
        }

        html += `<tr>
          <td>${entry.date}</td>
          <td>${typePill}</td>
          <td>${entry.litres.toFixed(1)}</td>
          <td>${entry.prix.toFixed(2)}</td>
          <td>${prixL}</td>
          <td>${kmDisplay}</td>
          <td>${consoDisplay}</td>
          <td><button class="danger" style="padding:4px 8px; font-size:0.8rem;" data-index="${realIndex}">🗑️</button></td>
        </tr>`;
      });
      html += '</tbody></table>';
      tableContainer.innerHTML = html;

      tableContainer.querySelectorAll('button[data-index]').forEach(btn => {
        btn.addEventListener('click', function() {
          const idx = parseInt(this.getAttribute('data-index'));
          if (confirm('Supprimer ce plein ?')) {
            logs.splice(idx, 1);
            saveLogs();
            renderTable();
            renderMonthlyStats();
          }
        });
      });

      renderMonthlyStats();
    }

    function addEntry(date, litres, prix, full, km) {
      const entry = {
        date,
        litres: parseFloat(litres),
        prix: parseFloat(prix),
        full: full,
        km: full ? parseFloat(km) : null
      };
      logs.push(entry);
      saveLogs();
      renderTable();
    }

    function exportCSV() {
      if (logs.length === 0) return;
      let csv = "Date,Type,Litres,Prix (€),Prix/L (€),Km,L/100\n";
      logs.forEach((e, idx) => {
        const prixL = e.litres > 0 ? (e.prix / e.litres).toFixed(3) : '';
        const type = e.full ? 'Complet' : 'Appoint';
        const kmVal = (e.full && e.km !== null) ? e.km.toFixed(1) : '';
        const conso = e.full ? computeConsumptionForFullTank(idx) : '';
        csv += `${e.date},${type},${e.litres},${e.prix},${prixL},${kmVal},${conso}\n`;
      });
      const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'essence.csv';
      a.click();
    }

    function clearAll() {
      if (confirm('Supprimer tout l\'historique ?')) {
        logs = [];
        saveLogs();
        renderTable();
      }
    }

    function init() {
      loadLogs();
      renderTable();

      document.getElementById('date').value = new Date().toISOString().split('T')[0];

      // Gestion affichage conditionnel du champ km
      const fullCheckbox = document.getElementById('full-tank');
      const kmField = document.getElementById('km-field');
      const kmInput = document.getElementById('km');

      fullCheckbox.addEventListener('change', function() {
        if (this.checked) {
          kmField.classList.remove('hidden');
          kmInput.required = true;
        } else {
          kmField.classList.add('hidden');
          kmInput.required = false;
          kmInput.value = '';
        }
      });

      // Initial state
      if (fullCheckbox.checked) {
        kmField.classList.remove('hidden');
        kmInput.required = true;
      } else {
        kmField.classList.add('hidden');
        kmInput.required = false;
      }

      document.getElementById('fuel-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const date = document.getElementById('date').value;
        const litres = document.getElementById('litres').value;
        const prix = document.getElementById('prix').value;
        const full = fullCheckbox.checked;
        const km = full ? kmInput.value : null;

        if (!date || !litres || !prix || parseFloat(litres) <= 0 || parseFloat(prix) <= 0) {
          alert('Remplissez tous les champs avec des valeurs positives.');
          return;
        }
        if (full) {
          if (!km || parseFloat(km) <= 0) {
            alert('Pour un plein complet, indiquez les kilomètres parcourus (>0).');
            return;
          }
          // Vérifier qu'il existe au moins un autre plein complet ou que c'est le premier (km accepté)
          // on accepte toujours le premier plein complet (pas de période précédente)
        } else {
          // appoint : pas de km
        }

        addEntry(date, litres, prix, full, km);
        // Réinitialiser le formulaire
        document.getElementById('date').value = new Date().toISOString().split('T')[0];
        document.getElementById('litres').value = '';
        document.getElementById('prix').value = '';
        fullCheckbox.checked = true; // on remet par défaut sur plein complet (plus fréquent)
        kmField.classList.remove('hidden');
        kmInput.required = true;
        kmInput.value = '';
        document.getElementById('litres').focus();
      });

      document.getElementById('export-btn').addEventListener('click', exportCSV);
      document.getElementById('clear-btn').addEventListener('click', clearAll);
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
    init();
  })();
</script>
</body>
</html>
