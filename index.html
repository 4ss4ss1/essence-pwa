<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Suivi Essence</title>
  
  <link rel="manifest" href="manifest.json">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Essence">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#0f172a">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f1f5f9;
      padding: 16px;
      color: #1e293b;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior: none;
    }
    .container { max-width: 500px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 20px; font-size: 1.6rem; color: #0f172a; }
    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }
    form { display: flex; flex-direction: column; gap: 14px; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    label { font-weight: 600; font-size: 0.9rem; color: #334155; }
    input {
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      font-size: 1rem;
      background: #f8fafc;
      transition: all 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
      background: white;
    }
    button {
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    button.primary { background: #2563eb; color: white; }
    button.primary:hover { background: #1d4ed8; }
    button.secondary { background: #e2e8f0; color: #1e293b; }
    button.secondary:hover { background: #cbd5e1; }
    button.danger { background: #fee2e2; color: #b91c1c; }
    button.danger:hover { background: #fecaca; }

    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 4px; }
    th {
      text-align: left;
      padding: 10px 4px;
      border-bottom: 2px solid #e2e8f0;
      color: #64748b;
      font-weight: 600;
    }
    td { padding: 10px 4px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    .stats {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      background: #f8fafc;
      padding: 14px;
      border-radius: 16px;
      margin-bottom: 16px;
    }
    .stat { display: flex; flex-direction: column; align-items: center; }
    .stat-value { font-size: 1.3rem; font-weight: 700; }
    .stat-label { font-size: 0.8rem; color: #64748b; text-align: center; }
    .actions { display: flex; gap: 12px; margin-top: 14px; justify-content: center; }
    .waiting { color: #94a3b8; font-style: italic; }
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .pill.full { background: #dcfce7; color: #166534; }
    .pill.partial { background: #fef08a; color: #854d0e; }
    .checkbox-field {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }
    .checkbox-field input[type="checkbox"] {
      width: 20px;
      height: 20px;
    }
    .settings-note { font-size: 0.8rem; color: #64748b; margin-top: 4px; }
  </style>
</head>
<body>
<div class="container">
  <h1>⛽ Suivi essence</h1>

  <!-- Paramètres -->
  <div class="card">
    <div class="field">
      <label for="capacity">Capacité du réservoir (L)</label>
      <input type="number" id="capacity" value="56" step="1" min="10" max="200" inputmode="numeric">
    </div>
    <div class="field">
      <label for="threshold">Seuil de suggestion "plein complet" (%)</label>
      <input type="number" id="threshold" value="80" step="1" min="50" max="100" inputmode="numeric">
    </div>
    <p class="settings-note">La case « Plein complet » sera pré-cochée si vous ajoutez au moins ce pourcentage de la capacité. Vous pouvez la modifier manuellement.</p>
  </div>

  <!-- Formulaire de saisie -->
  <div class="card">
    <form id="fuel-form">
      <div class="field">
        <label for="date">Date</label>
        <input type="date" id="date" required>
      </div>
      <div class="field">
        <label for="litres">Litres ajoutés (L)</label>
        <input type="number" id="litres" step="0.01" min="0.1" placeholder="Ex: 30" inputmode="decimal" required>
      </div>
      <div class="field">
        <label for="prix">Prix payé (€)</label>
        <input type="number" id="prix" step="0.01" min="0.01" placeholder="Ex: 52.5" inputmode="decimal" required>
      </div>
      <div class="field">
        <label for="odometer">Kilométrage total au compteur</label>
        <input type="number" id="odometer" step="1" min="0" placeholder="Ex: 123456" inputmode="numeric" required>
      </div>
      <div class="checkbox-field">
        <input type="checkbox" id="full-tank-checkbox">
        <label for="full-tank-checkbox">Plein complet (réservoir rempli)</label>
      </div>
      <button type="submit" class="primary">➕ Ajouter</button>
    </form>
  </div>

  <!-- Statistiques globales -->
  <div id="stats-section" class="card" style="display: none;">
    <div class="stats">
      <div class="stat">
        <span class="stat-value" id="avg-consumption">--</span>
        <span class="stat-label">Conso moyenne (L/100km)</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="total-spent">--</span>
        <span class="stat-label">Dépense totale (€)</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="total-km">--</span>
        <span class="stat-label">Kilométrage actuel</span>
      </div>
    </div>
  </div>

  <!-- Statistiques mensuelles -->
  <div id="monthly-section" class="card" style="display: none;">
    <h2 style="font-size: 1.1rem; margin-bottom: 12px;">📊 Statistiques mensuelles</h2>
    <div id="monthly-container"></div>
  </div>

  <!-- Historique -->
  <div class="card">
    <h2 style="font-size: 1.1rem; margin-bottom: 12px;">📋 Historique</h2>
    <div id="table-container">
      <p style="color: #64748b; text-align: center;">Aucun plein enregistré.</p>
    </div>
    <div class="actions" id="action-buttons" style="display: none;">
      <button id="export-btn" class="secondary">📤 Exporter CSV</button>
      <button id="clear-btn" class="danger">🗑️ Tout effacer</button>
    </div>
  </div>
</div>

<script>
  (function() {
    const STORAGE_KEY = 'fuel_logs_v10';
    const SETTINGS_KEY = 'fuel_settings_v10';
    let logs = [];
    let capacity = 56;
    let thresholdPercent = 80;

    function loadSettings() {
      try {
        const saved = localStorage.getItem(SETTINGS_KEY);
        if (saved) {
          const s = JSON.parse(saved);
          capacity = s.capacity || 56;
          thresholdPercent = s.thresholdPercent || 80;
        }
      } catch (e) {}
    }

    function saveSettings() {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify({ capacity, thresholdPercent }));
    }

    function suggestFullTank(litres) {
      return litres >= (thresholdPercent / 100) * capacity;
    }

    function loadLogs() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        logs = saved ? JSON.parse(saved) : [];
      } catch (e) { logs = []; }
    }

    function saveLogs() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
    }

    function getLastFullIndex(beforeIndex) {
      for (let i = beforeIndex - 1; i >= 0; i--) {
        if (logs[i].full) return i;
      }
      return -1;
    }

    function computeConsumption(idx) {
      if (!logs[idx].full) return null;
      const prevFullIdx = getLastFullIndex(idx);
      if (prevFullIdx === -1) return null;
      const distance = logs[idx].odometer - logs[prevFullIdx].odometer;
      if (distance <= 0) return null;
      let totalLitres = 0;
      for (let i = prevFullIdx + 1; i <= idx; i++) {
        totalLitres += logs[i].litres;
      }
      return ((totalLitres * 100) / distance).toFixed(1);
    }

    function computeGlobalStats() {
      if (logs.length === 0) return null;
      let totalLitres = 0, totalKm = 0;
      for (let i = 0; i < logs.length; i++) {
        if (logs[i].full) {
          const prevFullIdx = getLastFullIndex(i);
          if (prevFullIdx !== -1) {
            const distance = logs[i].odometer - logs[prevFullIdx].odometer;
            if (distance > 0) {
              totalKm += distance;
              let periodLitres = 0;
              for (let j = prevFullIdx + 1; j <= i; j++) periodLitres += logs[j].litres;
              totalLitres += periodLitres;
            }
          }
        }
      }
      const avgConso = totalKm > 0 ? (totalLitres * 100) / totalKm : 0;
      const totalSpent = logs.reduce((sum, e) => sum + e.prix, 0);
      const lastOdo = logs.length > 0 ? logs[logs.length-1].odometer : 0;
      return { avgConso: avgConso.toFixed(2), totalSpent: totalSpent.toFixed(2), lastOdometer: lastOdo };
    }

    function computeMonthlyStats() {
      if (logs.length === 0) return [];
      const months = {};
      for (let i = 0; i < logs.length; i++) {
        if (logs[i].full) {
          const prevFullIdx = getLastFullIndex(i);
          const distance = prevFullIdx === -1 ? 0 : logs[i].odometer - logs[prevFullIdx].odometer;
          let litresPeriod = 0, prixPeriod = 0;
          const start = prevFullIdx === -1 ? 0 : prevFullIdx + 1;
          for (let j = start; j <= i; j++) {
            litresPeriod += logs[j].litres;
            prixPeriod += logs[j].prix;
          }
          const month = logs[i].date.substring(0,7);
          if (!months[month]) months[month] = { litres: 0, prix: 0, km: 0 };
          months[month].km += distance;
          months[month].litres += litresPeriod;
          months[month].prix += prixPeriod;
        } else {
          const month = logs[i].date.substring(0,7);
          if (!months[month]) months[month] = { litres: 0, prix: 0, km: 0 };
          months[month].prix += logs[i].prix;
        }
      }
      const array = Object.keys(months).map(month => {
        const m = months[month];
        const conso = m.km > 0 ? ((m.litres * 100) / m.km).toFixed(1) : null;
        return {
          month,
          totalPrix: m.prix.toFixed(2),
          totalKm: m.km.toFixed(1),
          conso
        };
      }).sort((a, b) => b.month.localeCompare(a.month));
      return array;
    }

    function renderMonthlyStats() {
      const container = document.getElementById('monthly-container');
      const section = document.getElementById('monthly-section');
      const data = computeMonthlyStats();
      if (data.length === 0) { section.style.display = 'none'; return; }
      section.style.display = 'block';
      let html = `<table><thead><tr><th>Mois</th><th>Conso (L/100)</th><th>Dépense (€)</th><th>Km</th></tr></thead><tbody>`;
      data.forEach(item => {
        const [y, m] = item.month.split('-');
        const monthName = new Date(y, m-1).toLocaleDateString('fr-FR', { month:'long', year:'numeric' });
        const consoDisp = item.conso ? item.conso : '<span class="waiting">—</span>';
        html += `<tr><td>${monthName}</td><td>${consoDisp}</td><td>${item.totalPrix}</td><td>${item.totalKm}</td></tr>`;
      });
      html += '</tbody></table>';
      container.innerHTML = html;
    }

    function renderTable() {
      const tableContainer = document.getElementById('table-container');
      const statsSection = document.getElementById('stats-section');
      const actionBtns = document.getElementById('action-buttons');
      if (logs.length === 0) {
        tableContainer.innerHTML = '<p style="color:#64748b;text-align:center;">Aucun plein enregistré.</p>';
        statsSection.style.display = 'none';
        document.getElementById('monthly-section').style.display = 'none';
        actionBtns.style.display = 'none';
        return;
      }
      actionBtns.style.display = 'flex';
      statsSection.style.display = 'block';
      const global = computeGlobalStats();
      if (global) {
        document.getElementById('avg-consumption').textContent = global.avgConso;
        document.getElementById('total-spent').textContent = global.totalSpent + ' €';
        document.getElementById('total-km').textContent = global.lastOdometer + ' km';
      }

      let html = `<table><thead><tr><th>Date</th><th>Type</th><th>L</th><th>€</th><th>€/L</th><th>Km total</th><th>Conso (L/100)</th><th></th></tr></thead><tbody>`;
      const reversed = [...logs].reverse();
      reversed.forEach((entry, displayIndex) => {
        const realIndex = logs.length - 1 - displayIndex;
        const prixL = entry.litres > 0 ? (entry.prix / entry.litres).toFixed(2) : '-';
        const typePill = entry.full ? '<span class="pill full">Complet</span>' : '<span class="pill partial">Appoint</span>';
        let consoDisplay = '<span class="waiting">—</span>';
        if (entry.full) {
          const conso = computeConsumption(realIndex);
          if (conso) consoDisplay = conso;
        }
        html += `<tr>
          <td>${entry.date}</td>
          <td>${typePill}</td>
          <td>${entry.litres.toFixed(1)}</td>
          <td>${entry.prix.toFixed(2)}</td>
          <td>${prixL}</td>
          <td>${entry.odometer}</td>
          <td>${consoDisplay}</td>
          <td><button class="danger" style="padding:4px 8px;font-size:0.8rem;" data-index="${realIndex}">🗑️</button></td>
        </tr>`;
      });
      html += '</tbody></table>';
      tableContainer.innerHTML = html;
      tableContainer.querySelectorAll('button[data-index]').forEach(btn => {
        btn.addEventListener('click', function() {
          const idx = parseInt(this.getAttribute('data-index'));
          if (confirm('Supprimer ce plein ?')) {
            logs.splice(idx, 1);
            saveLogs();
            renderTable();
            renderMonthlyStats();
          }
        });
      });
      renderMonthlyStats();
    }

    function addEntry(date, litres, prix, odometer, full) {
      if (logs.length > 0 && odometer <= logs[logs.length-1].odometer) {
        alert(`Le kilométrage doit être supérieur au précédent (${logs[logs.length-1].odometer} km).`);
        return false;
      }
      logs.push({
        date,
        litres: parseFloat(litres),
        prix: parseFloat(prix),
        odometer: parseInt(odometer),
        full
      });
      saveLogs();
      renderTable();
      return true;
    }

    function exportCSV() {
      if (logs.length === 0) return;
      let csv = "Date,Type,Litres,Prix (€),Prix/L (€),Km total,Conso L/100\n";
      logs.forEach((e, idx) => {
        const prixL = e.litres > 0 ? (e.prix / e.litres).toFixed(3) : '';
        const type = e.full ? 'Complet' : 'Appoint';
        const conso = e.full ? computeConsumption(idx) : '';
        csv += `${e.date},${type},${e.litres},${e.prix},${prixL},${e.odometer},${conso}\n`;
      });
      const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'essence.csv';
      a.click();
    }

    function clearAll() {
      if (confirm('Supprimer tout l\'historique ?')) {
        logs = [];
        saveLogs();
        renderTable();
      }
    }

    function updateFullTankSuggestion() {
      const litresInput = document.getElementById('litres');
      const checkbox = document.getElementById('full-tank-checkbox');
      const litres = parseFloat(litresInput.value);
      if (!isNaN(litres) && litres > 0) {
        checkbox.checked = suggestFullTank(litres);
      } else {
        checkbox.checked = false;
      }
    }

    function init() {
      loadSettings();
      loadLogs();
      
      document.getElementById('capacity').value = capacity;
      document.getElementById('threshold').value = thresholdPercent;

      document.getElementById('capacity').addEventListener('change', function() {
        capacity = parseInt(this.value) || 56;
        saveSettings();
        updateFullTankSuggestion();
      });
      document.getElementById('threshold').addEventListener('change', function() {
        thresholdPercent = parseInt(this.value) || 80;
        saveSettings();
        updateFullTankSuggestion();
      });

      document.getElementById('date').value = new Date().toISOString().split('T')[0];
      
      document.getElementById('litres').addEventListener('input', updateFullTankSuggestion);
      updateFullTankSuggestion();

      document.getElementById('fuel-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const date = document.getElementById('date').value;
        const litres = parseFloat(document.getElementById('litres').value);
        const prix = parseFloat(document.getElementById('prix').value);
        const odometer = parseInt(document.getElementById('odometer').value);
        const full = document.getElementById('full-tank-checkbox').checked;

        if (!date || isNaN(litres) || isNaN(prix) || isNaN(odometer) || litres <= 0 || prix <= 0 || odometer < 0) {
          alert('Veuillez remplir tous les champs avec des valeurs valides.');
          return;
        }

        if (addEntry(date, litres, prix, odometer, full)) {
          document.getElementById('date').value = new Date().toISOString().split('T')[0];
          document.getElementById('litres').value = '';
          document.getElementById('prix').value = '';
          document.getElementById('odometer').value = '';
          updateFullTankSuggestion();
          document.getElementById('litres').focus();
        }
      });

      document.getElementById('export-btn').addEventListener('click', exportCSV);
      document.getElementById('clear-btn').addEventListener('click', clearAll);
      renderTable();
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
    init();
  })();
</script>
</body>
</html>
